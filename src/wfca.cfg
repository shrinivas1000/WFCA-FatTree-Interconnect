// Topology: Fat-Tree
topology = fattree;
k = 4;
n = 3;

// Custom Adaptive Routing (Congestion-Aware Upward Phase)
routing_function = wfca;

// Protocol
num_vcs = 4;
read_request_begin_vc = 0;
read_request_end_vc = 1;
write_request_begin_vc = 2;
write_request_end_vc = 3;

// Workload Pattern
traffic = shuffle;
injection_rate = 0.70;

sim_type = latency;
